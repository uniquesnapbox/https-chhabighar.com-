<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f2115"/>
      <stop offset="55%" stop-color="#1a130e"/>
      <stop offset="100%" stop-color="#090807"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="72%" r="40%">
      <stop offset="0%" stop-color="#ffcc6e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffcc6e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d4425"/>
      <stop offset="100%" stop-color="#3b2313"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7d9"/>
      <stop offset="100%" stop-color="#d8b15c"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#2b2b2b"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d9b4"/>
      <stop offset="100%" stop-color="#8f6941"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="600" cy="650" rx="360" ry="100" fill="url(#glow)"/>
  <rect x="0" y="620" width="1200" height="280" fill="url(#wood)"/>

  <circle cx="470" cy="330" r="120" fill="none" stroke="url(#metal)" stroke-width="24"/>
  <path d="M550 410 L675 525" stroke="url(#metal)" stroke-width="20" stroke-linecap="round"/>

  <rect x="620" y="470" width="300" height="250" rx="34" fill="url(#plate)" stroke="#d8b15c" stroke-width="8"/>
  <rect x="675" y="530" width="190" height="140" rx="16" fill="url(#photo)"/>
  <circle cx="650" cy="505" r="16" fill="#efd08a"/>

  <circle cx="748" cy="585" r="36" fill="#3d2e1f"/>
  <circle cx="795" cy="592" r="30" fill="#4d3622"/>
  <path d="M722 635 C760 670, 790 670, 822 635" stroke="#f5d189" stroke-width="4" fill="none"/>

  <text x="600" y="815" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="82" font-weight="700" fill="#f4d79a">Custom Keychain</text>
</svg>
